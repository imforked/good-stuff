# Postgres + API. Prisma schema applies via docker-entrypoint.sh (migrate deploy or db push).
#
# From this directory (server/):
#   docker compose up --build
#
# URL matches POSTGRES_* below. Override DATABASE_URL if needed.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: good_stuff
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d good_stuff"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: