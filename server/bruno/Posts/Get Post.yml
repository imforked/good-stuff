info:
  name: Get Post
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/posts/{{postId}}
  headers:
    - name: Origin
      value: http://localhost:3000
    - name: Cookie
      value: better-auth.session_token={{sessionToken}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return the post", function () {
          const body = res.getBody();
          const postId = bru.getVar("postId");
          const postTitle = bru.getVar("postTitle");

          expect(body).to.have.property("id", postId);
          expect(body).to.have.property("userId");
          expect(body).to.have.property("title", postTitle);
          expect(body).to.have.property("createdAt");
          expect(body).to.have.property("updatedAt");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
