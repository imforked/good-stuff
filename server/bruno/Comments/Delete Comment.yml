info:
  name: Delete Comment
  type: http
  seq: 3

http:
  method: DELETE
  url: http://localhost:3000/api/comments/{{commentId}}
  headers:
    - name: Origin
      value: http://localhost:3000
    - name: Cookie
      value: better-auth.session_token={{sessionToken}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 204", function () {
          expect(res.getStatus()).to.equal(204);
        });

        test("should return no content", function () {
          const body = res.getBody();

          expect(body === undefined || body === null || body === "").to.equal(true);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
