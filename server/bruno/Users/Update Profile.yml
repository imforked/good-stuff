info:
  name: Update Profile
  type: http
  seq: 2

http:
  method: PUT
  url: http://localhost:3000/api/update-profile
  headers:
    - name: Origin
      value: http://localhost:3000
    - name: Cookie
      value: better-auth.session_token={{sessionToken}}
  body:
    type: json
    data: |-
      {
        "displayName": "Updated Plumbus"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return the updated profile", function () {
          const body = res.getBody();

          expect(body).to.have.property("id");
          expect(body).to.have.property("userId");
          expect(body).to.have.property("displayName", "Updated Plumbus");
          expect(body).to.have.property("pfpS3Url");
          expect(body).to.have.property("createdAt");
          expect(body).to.have.property("updatedAt");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
