info:
  name: Create Profile
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/profile
  headers:
    - name: Origin
      value: http://localhost:3000
    - name: Cookie
      value: better-auth.session_token={{sessionToken}}
  body:
    type: json
    data: |-
      {
        "displayName": "{{signUpName}}",
        "pfpS3Url": "https://example.com/avatar.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        test("should return the created profile", function () {
          const body = res.getBody();
          const signUpName = bru.getVar("signUpName");

          expect(body).to.have.property("id");
          expect(body).to.have.property("userId");
          expect(body).to.have.property("displayName", signUpName);
          expect(body).to.have.property("pfpS3Url", "https://example.com/avatar.png");
          expect(body).to.have.property("createdAt");
          expect(body).to.have.property("updatedAt");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
