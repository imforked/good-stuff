info:
  name: Create Account
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/create-account
  body:
    type: json
    data: |-
      {
        "displayName": "Plumbus",
        "pfpS3Url": "https://example.com/avatar.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        test("should return user with profile", function () {
          const body = res.getBody();

          expect(body).to.have.property("id");
          expect(body).to.have.property("createdAt");
          expect(body).to.have.property("updatedAt");
          expect(body).to.have.property("profile");

          expect(body.profile).to.have.property("id");
          expect(body.profile).to.have.property("userId", body.id);
          expect(body.profile).to.have.property("displayName", "Plumbus");
          expect(body.profile).to.have.property("pfpS3Url", "https://example.com/avatar.png");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
