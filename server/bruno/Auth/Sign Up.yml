info:
  name: Sign Up
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/sign-up/email
  headers:
    - name: Origin
      value: http://localhost:3000
  body:
    type: json
    data: |-
      {
        "name": "{{signUpName}}",
        "email": "{{signUpEmail}}",
        "password": "password1234",
        "image": "https://example.com/avatar.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const stamp = Date.now();
        // keep displayName-friendly (max 20 chars in app schema)
        bru.setVar("signUpName", `Plumbus ${String(stamp).slice(-6)}`);
        bru.setVar("signUpEmail", `plumbus+${stamp}@example.com`);
    - type: after-response
      code: |-
        const body = res.getBody();

        if (body && body.token) {
          bru.setVar("sessionToken", body.token);
        }
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return session token and user", function () {
          const body = res.getBody();
          const signUpName = bru.getVar("signUpName");
          const signUpEmail = bru.getVar("signUpEmail");

          expect(body).to.have.property("token").that.is.a("string");
          expect(body).to.have.property("user");

          expect(body.user).to.have.property("id");
          expect(body.user).to.have.property("name", signUpName);
          expect(body.user).to.have.property("email", signUpEmail);
          expect(body.user).to.have.property("emailVerified", false);
          expect(body.user).to.have.property("image", "https://example.com/avatar.png");
          expect(body.user).to.have.property("createdAt");
          expect(body.user).to.have.property("updatedAt");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
